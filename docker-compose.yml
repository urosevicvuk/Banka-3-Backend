services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  bank:
    container_name: bank
    build:
      context: .
      dockerfile: cmd/bank/Dockerfile
    ports:
      - "${BANK_GRPC_PORT:-50053}:50051"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      GRPC_PORT: "50051"
      NOTIFICATION_GRPC_ADDR: ${NOTIFICATION_GRPC_ADDR:-notification:50051}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [banka]

  exchange:
    container_name: exchange
    build:
      context: .
      dockerfile: cmd/exchange/Dockerfile
    ports:
      - "${EXCHANGE_GRPC_PORT:-50054}:50051"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      GRPC_PORT: "50051"
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [banka]

  user:
    container_name: user
    build:
      context: .
      dockerfile: cmd/user/Dockerfile
    ports:
      - "${USER_GRPC_PORT:-50051}:50051"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      GRPC_PORT: "50051"
      ACCESS_JWT_SECRET: ${ACCESS_JWT_SECRET}
      REFRESH_JWT_SECRET: ${REFRESH_JWT_SECRET}
      NOTIFICATION_GRPC_ADDR: ${NOTIFICATION_GRPC_ADDR:-notification:50051}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL}
      PASSWORD_SET_BASE_URL: ${PASSWORD_SET_BASE_URL}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TOTP_DISABLE_BASE_URL: ${TOTP_DISABLE_BASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [banka]

  notification:
    container_name: notification
    build:
      context: .
      dockerfile: cmd/notification/Dockerfile
    ports:
      - "${NOTIFICATION_GRPC_PORT:-50052}:50051"
    environment:
      GRPC_PORT: "50051"
      FROM_EMAIL: "${FROM_EMAIL}"
      FROM_EMAIL_AUTH: "${FROM_EMAIL_AUTH}"
      FROM_EMAIL_PASSWORD: "${FROM_EMAIL_PASSWORD}"
      FROM_EMAIL_SMTP: "${FROM_EMAIL_SMTP}"
      SMTP_ADDR: "${SMTP_ADDR}"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    networks: [banka]

  gateway:
    container_name: gateway
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      HTTP_PORT: "8080"
      USER_GRPC_ADDR: "user:50051"
      NOTIFICATION_GRPC_ADDR: "notification:50051"
      BANK_GRPC_ADDR: "bank:50051"
      EXCHANGE_GRPC_ADDR: "exchange:50051"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      - user
      - notification
      - bank
      - exchange
    networks: [banka]

volumes:
  pgdata:
  redisdata:

networks:
  banka:
    name: banka-net
