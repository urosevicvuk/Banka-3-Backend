<!DOCTYPE html>

  <style>
    body{
      font-family: Arial, sans-serif;
    }
    .container{

      border-radius: 5px;

      text-align: center;
    }

<body>

<div class="container">
  <h2>Click the link below to go to page to activate your account</h2>
