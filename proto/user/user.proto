syntax = "proto3";

package user;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/gen/user";

service UserService {
  rpc GetEmployeeById(GetEmployeeByIdRequest) returns (GetEmployeeResponse);
  rpc GetEmployeeByEmail(GetEmployeeByEmailRequest) returns (GetEmployeeResponse);
  rpc GetEmployees(GetEmployeesRequest) returns (GetEmployeesResponse);
  rpc UpdateEmployee(UpdateEmployeeRequest) returns (UpdateEmployeeResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc ValidateAccessToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ValidateRefreshToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc RequestPasswordReset(PasswordActionRequest) returns (PasswordActionResponse);
  rpc RequestInitialPasswordSet(PasswordActionRequest) returns (PasswordActionResponse);
  rpc SetPasswordWithToken(SetPasswordWithTokenRequest) returns (SetPasswordWithTokenResponse);
  rpc CreateClientAccount(CreateClientRequest) returns (CreateClientResponse);
  rpc CreateEmployeeAccount(CreateEmployeeRequest) returns (CreateEmployeeResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  string sub = 1;
  int64 iat = 2;
  int64 exp = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message EmployeeResponse {
  int64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string position = 5;
  bool active = 6;
}

message LogoutRequest {
  string email = 1;
}

message LogoutResponse {
  bool success = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message PasswordActionRequest {
  string email = 1;
}

message PasswordActionResponse {
  bool accepted = 1;
}

message SetPasswordWithTokenRequest {
  string token = 1;
  string new_password = 2;
}

message SetPasswordWithTokenResponse {
  bool successful = 1;
}

// message Permission {
//   uint64 id = 1;
//   string permision = 2;
// }

message CreateEmployeeRequest {
  string first_name = 1;
  string last_name = 2;
  int64 birth_date = 3;
  string gender = 4;
  string email = 5;
  string phone_number = 6;
  string address = 7;
  string username = 8;
  string position = 9;
  string department = 10;
  string password = 11;
}

message CreateEmployeeResponse {
  bool valid = 1;
}

message CreateClientRequest {
  string first_name = 1;
  string last_name = 2;
  int64 birth_date = 3;
  string gender = 4;
  string email = 5;
  string phone_number = 6;
  string address = 7;
  string password = 8;
}

message CreateClientResponse {
  bool valid = 1;
}

message GetEmployeesRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string position = 4;
}

message GetEmployeesResponse {
  message Employee {
    int64 id = 1;
    string first_name = 2;
    string last_name = 3;
    string email = 4;
    string position = 5;
    string phone_number = 6;
    bool active = 8;
  }
  repeated Employee employees = 1;
}

message GetEmployeeByIdRequest {
  int64 id = 1;
}

message GetEmployeeByEmailRequest {
  string email = 1;
}

message GetEmployeeResponse {
  int64 id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 birth_date = 4;
  string gender = 5;
  string email = 6;
  string phone_number = 7;
  string address = 8;
  string username = 9;
  string position = 10;
  string department = 11;
  bool active = 12;
  repeated string permissions = 13;
}

message UpdateEmployeeRequest {
  int64 id = 1;
  string last_name = 2;
  string gender = 3;
  string phone_number = 4;
  string address = 5;
  string position = 6;
  string department = 7;
  bool active = 8;
  repeated string permissions = 9;
}

message UpdateEmployeeResponse {
  bool valid = 1;
  string response = 2;
}
