syntax = "proto3";

package user;

option go_package = "banka-raf/gen/user";

service UserService {
  rpc GetEmployeeById(GetEmployeeByIdRequest) returns (EmployeeResponse);
}

message GetEmployeeByIdRequest {
  int64 id = 1;
}

message EmployeeResponse {
  int64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string position = 5;
  bool active = 6;
}

message SearchEmployees{
  string search_term=1;
}
