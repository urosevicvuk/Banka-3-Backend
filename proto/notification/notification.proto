syntax = "proto3";

package notification;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/gen/notification";

service NotificationService {
  rpc SendConfirmationEmail(ConfirmationMailRequest) returns (SuccessResponse);
  rpc SendActivationEmail(ActivationMailRequest) returns (SuccessResponse);
  rpc SendPasswordResetEmail(PasswordLinkMailRequest) returns (SuccessResponse);
  rpc SendInitialPasswordSetEmail(PasswordLinkMailRequest) returns (SuccessResponse);
  rpc SendCardConfirmationEmail(CardConfirmationMailRequest) returns (SuccessResponse);
  rpc SendCardCreatedEmail(CardCreatedMailRequest) returns (SuccessResponse);
  rpc SendLoanPaymentFailedEmail(LoanPaymentFailedMailRequest) returns (SuccessResponse);

  rpc SendTOTPDisableEmail(SendTOTPDisableEmailRequest) returns (SuccessResponse);

  rpc SendBankAccountCreationEmail(SendBankAccountCreationEmailRequest) returns (SuccessResponse);
}

message SendBankAccountCreationEmailRequest {
  string to_addr = 1;
  string account_name = 2;
}

message SendTOTPDisableEmailRequest {
  string email = 1;
  string link = 2;
}

message ConfirmationMailRequest {
  string to_addr = 1; // comma separated addresses of receivers
  string subject = 2;
  string body = 3;
}

message ActivationMailRequest {
  string to_addr = 1; // comma separated addresses of receivers
  string link = 2; // link to page
}

message PasswordLinkMailRequest {
  string to_addr = 1;
  string link = 2;
}

message CardConfirmationMailRequest {
  string to_addr = 1;
  string link = 2;
}

message CardCreatedMailRequest {
  string to_addr = 1;
}

message LoanPaymentFailedMailRequest {
  string to_addr = 1;
  string loan_number = 2;
  string amount = 3;
  string currency = 4;
  string due_date = 5;
}

message SuccessResponse {
  bool successful = 1;
}
