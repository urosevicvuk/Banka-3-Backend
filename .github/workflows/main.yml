name: CI

on:
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check gofmt
        run: test -z "$(gofmt -l .)"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.4

  proto-check:
    name: Proto staleness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate protos
        run: make proto
      - name: Check for diff
        run: |
          if ! git diff --exit-code gen/; then
            echo "::error::Generated proto code is out of date. Run 'make proto' and commit the result."
            exit 1
          fi

  build:
    name: Build services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./cmd/...

  schema-check:
    name: Schema check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Apply schema
        run: psql -f scripts/db/schema.sql
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
      - name: Apply seed
        run: psql -f scripts/db/seed.sql
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...
